<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GitHub</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar__row">
          <div class="seg" id="mode-switch" role="tablist">
            <button class="seg__btn is-active" data-mode="issues">Issues</button>
            <button class="seg__btn" data-mode="prs">Pull Requests</button>
          </div>
          <div class="topbar__spacer"></div>
          <div class="seg" id="state-filter" role="tablist">
            <button class="seg__btn is-active" data-state="open">Open</button>
            <button class="seg__btn" data-state="closed">Closed</button>
            <button class="seg__btn" data-state="all">All</button>
          </div>
          <button id="refresh" class="icon-btn" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none"
                 stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9" />
              <path d="M13.5 2.5V5H11" />
            </svg>
          </button>
        </div>
        <div class="topbar__row topbar__row--sub">
          <div class="picker">
            <select id="project" class="picker__select" aria-label="Project">
              <option value="">Current project</option>
            </select>
            <svg class="picker__caret" viewBox="0 0 16 16" width="12" height="12"
                 fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 6l4 4 4-4" />
            </svg>
          </div>
          <span id="repo" class="topbar__repo"></span>
        </div>
      </header>
      <main id="content" class="content"></main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
